name: Node.js CI

on:
  push:
    branches: master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    # See: https://github.com/actions/setup-node/issues/480
    - run: corepack enable
    - uses: actions/checkout@v3
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version-file: package.json
        cache: 'yarn'
    - run: yarn --version
    - run: npx corepack prepare "yarn@$(node --print 'require("./package").volta.yarn')"
    - run: yarn --version
    - run: yarn install --immutable
    - run: yarn test
